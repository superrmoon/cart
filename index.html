<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cart">
  <meta name="theme-color" content="#2c3e50">
  <title>Cart</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <!-- List View -->
  <div id="list-view" class="view active">
    <header>
      <h1>Cart</h1>
      <div id="auth-area">
        <button id="auth-btn" class="btn-auth" aria-label="Login">
          <span id="auth-text">로그인</span>
          <img id="auth-photo" src="" alt="" style="display:none;">
        </button>
      </div>
      <button id="settings-btn" class="btn-icon btn-settings" aria-label="Settings" style="display:none;font-size:18px;">&#9881;</button>
      <button id="add-list-btn" class="btn-icon" aria-label="Add list">+</button>
    </header>
    <ul id="lists-container"></ul>
    <div id="empty-lists" class="empty-state">
      <p>목록이 없습니다</p>
      <p class="hint">+ 버튼으로 새 목록을 추가하세요</p>
    </div>
  </div>

  <!-- Item View -->
  <div id="item-view" class="view">
    <header>
      <button id="back-btn" class="btn-icon" aria-label="Back">&larr;</button>
      <h1 id="item-view-title"></h1>
      <button id="add-item-btn" class="btn-icon" aria-label="Add item">+</button>
    </header>
    <div id="item-summary">
      <span id="total-amount">0원</span>
      <label class="toggle-label">
        <input type="checkbox" id="hide-completed">
        <span>완료 숨김</span>
      </label>
    </div>
    <ul id="items-container"></ul>
    <div id="empty-items" class="empty-state">
      <p>품목이 없습니다</p>
      <p class="hint">+ 버튼으로 품목을 추가하세요</p>
    </div>
  </div>

  <!-- Add/Edit List Modal -->
  <div id="list-modal" class="modal">
    <div class="modal-content">
      <h2 id="list-modal-title">새 목록</h2>
      <input type="text" id="list-name-input" placeholder="목록 이름" autocomplete="off">
      <div class="modal-actions">
        <button id="list-modal-cancel" class="btn btn-cancel">취소</button>
        <button id="list-modal-save" class="btn btn-save">저장</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Item Modal -->
  <div id="item-modal" class="modal">
    <div class="modal-content">
      <h2 id="item-modal-title">품목 추가</h2>
      <input type="text" id="item-name-input" placeholder="품목명" autocomplete="off">
      <input type="date" id="item-date-input">
      <input type="number" id="item-amount-input" placeholder="금액 (원)" inputmode="numeric" min="0">
      <div class="modal-actions">
        <button id="item-modal-cancel" class="btn btn-cancel">취소</button>
        <button id="item-modal-save" class="btn btn-save">저장</button>
      </div>
    </div>
  </div>

  <!-- API Result View (shown when adding via URL) -->
  <div id="api-result-view" class="view">
    <header>
      <h1>Cart</h1>
    </header>
    <div id="api-result" class="api-result">
      <div id="api-result-icon"></div>
      <p id="api-result-message"></p>
      <button id="api-result-open" class="btn btn-save" style="margin-top:16px;">앱 열기</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal">
    <div class="modal-content settings-content">
      <h2>API 토큰 설정</h2>
      <p class="settings-desc">토큰을 사용하면 URL로 항목을 추가할 수 있습니다.</p>
      <div id="token-list"></div>
      <button id="generate-token-btn" class="btn btn-save" style="width:100%;margin-top:12px;">토큰 생성</button>
      <div id="token-usage" class="token-usage">
        <p class="token-usage-title">사용법</p>
        <code id="token-usage-url">...?token=TOKEN&action=add&list=목록명&name=품목명&amount=금액</code>
      </div>
      <div class="modal-actions" style="margin-top:16px;">
        <button id="settings-close" class="btn btn-cancel" style="flex:1;">닫기</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirm-modal" class="modal">
    <div class="modal-content">
      <p id="confirm-message"></p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="btn btn-cancel">취소</button>
        <button id="confirm-ok" class="btn btn-danger">삭제</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (compat version for CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <!-- App modules -->
  <script src="firebase-config.js"></script>
  <script src="firebase-auth.js"></script>
  <script src="firebase-db.js"></script>
  <script src="app.js"></script>
</body>
</html>
